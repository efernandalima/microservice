input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON se ainda não estiver parseado
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Adiciona campos úteis
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "microservices-logs"
    }
  }

  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
  }

  # Debug output (opcional)
  stdout {
    codec => rubydebug
  }
}
