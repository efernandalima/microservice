server:
  port: 8081

spring:
  application:
    name: servico-usuario
  
  datasource:
    url: jdbc:postgresql://localhost:5432/usuariodb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
    
    mongodb:
      uri: mongodb://localhost:27017/events
      database: events
  
  cache:
    type: redis
    redis:
      time-to-live: 600000

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Encryption
encryption:
  key: ${ENCRYPTION_KEY:VGhpcyBpcyBhIDMyIGJ5dGUga2V5IGZvciBBRVMyNTY=}

# OpenTelemetry — exportação de traces via Micrometer/OTel bridge
otel:
  service:
    name: servico-usuario
  exporter:
    otlp:
      endpoint: http://localhost:4319
  traces:
    exporter: otlp
  metrics:
    exporter: none

# JWT Configuration
jwt:
  secret: "YVd4bVpXNWhaR1Z1ZEdGMWJXVnVkR2x2Ym5OdmIzTmxjM1Z5WlhNPSAg"
  expiration: 86400000  # 24 hours in milliseconds

# Logging (padrão definido em logback-spring.xml — LogstashEncoder JSON)
logging:
  logstash:
    host: localhost
    port: 5000
  level:
    root: INFO
    lab.microservices: DEBUG

# Actuator and Tracing
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  otlp:
    tracing:
      endpoint: http://localhost:4319/v1/traces
  tracing:
    sampling:
      probability: 1.0
